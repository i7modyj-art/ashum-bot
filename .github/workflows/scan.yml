name: 📈 Scheduled Market Scan V2

on:
  schedule:
    # اختبار: كل 30 دقيقة (سنرجعه للجدولة الأصلية بعد التأكد)
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'وضع الفحص'
        required: true
        default: 'swing'
        type: choice
        options: [swing, dte]
      min_confidence:
        description: 'الحد الأدنى للثقة'
        required: false
        default: '75'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Run Market Scan
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SYMBOLS: ${{ secrets.SYMBOLS || 'TSLA,NVDA,AAPL,META,GOOGL,MSFT,AMD' }}
          SCAN_MODE: ${{ github.event.inputs.mode || 'swing' }}
          MIN_CONFIDENCE: ${{ github.event.inputs.min_confidence || '75' }}
          TOP_N: '3'
          SEND_SUMMARY: 'true'
        run: python scan.py

      - name: 💾 Commit positions update
        run: |
          if [ -f positions.json ] || [ -f closed.json ]; then
            git config user.name "ashum-bot"
            git config user.email "bot@ashum.local"
            git add positions.json closed.json 2>/dev/null || true
            git diff --cached --quiet || git commit -m "chore: positions update [scan]"
            git push || true
          fi
