name: 🤖 Telegram Commands Listener V2

on:
  schedule:
    - cron: '*/5 * * * *'

  workflow_dispatch:

jobs:
  listen:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎧 Process Telegram Commands
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SYMBOLS: ${{ secrets.SYMBOLS || 'TSLA,NVDA,AAPL,META,GOOGL,MSFT,AMD' }}
        run: python listen.py

      - name: 💾 Save state
        run: |
          git config user.name "ashum-bot"
          git config user.email "bot@ashum.local"
          git add last_offset.json positions.json closed.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: state update [listen]"
          git push || true
